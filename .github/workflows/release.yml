name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.1"
        required: true
        type: string

jobs:
  build-mac:
    name: Build macOS Universal
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --include=dev --no-audit --no-fund

      - name: Build DMG
        run: npm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-win:
    name: Build Windows x64
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --include=dev --no-audit --no-fund

      - name: Build EXE
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-exe
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-win
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-universal-dmg
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-exe
          path: release-assets

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION="$(node -p "require('./package.json').version")"
          TITLE="HK Fish Ticker ${TAG}"
          NOTES="Automated release for version ${VERSION}."
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "title=${TITLE}" >> "${GITHUB_OUTPUT}"
          echo "notes=${NOTES}" >> "${GITHUB_OUTPUT}"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="${{ steps.meta.outputs.title }}"
          NOTES="${{ steps.meta.outputs.notes }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, reusing it."
          else
            gh release create "${TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${TITLE}" \
              --notes "${NOTES}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          while IFS= read -r -d '' file; do
            gh release upload "${TAG}" "${file}" --clobber
          done < <(find release-assets -type f \( -name '*.dmg' -o -name '*.exe' \) -print0)
